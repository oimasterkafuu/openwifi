name: Build AutoHotspot

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      - name: Build with MSVC
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          if not exist "build" mkdir "build"
          cl.exe /nologo /W3 /O2 /MT /Fe"build\AutoHotspot.exe" src\main.cpp /link /SUBSYSTEM:WINDOWS /ENTRY:WinMain kernel32.lib user32.lib advapi32.lib shell32.lib ucrt.lib vcruntime.lib msvcrt.lib

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AutoHotspot
          path: build/AutoHotspot.exe

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: build/AutoHotspot.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
